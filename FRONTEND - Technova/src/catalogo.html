<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — TechNova</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/catalogo.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>

<body>

  <!-- NAVBAR compartido -->
  <div id="navbar-container"></div>

  <!-- HERO STRIP -->
  <div class="cat-hero-strip">
    <div class="cat-hero-glow"></div>
    <div class="cat-hero-content">
      <span class="cat-hero-tag">Catálogo completo</span>
      <h1 class="cat-hero-title">Encuentra tu próximo <span class="gradient-text">dispositivo</span></h1>
      <p class="cat-hero-sub">Tecnología de última generación seleccionada para ti</p>
    </div>
  </div>

  <!-- MAIN -->
  <main class="cat-main">
<!-- Toolbar: categorías + buscador + contador -->
<div class="cat-toolbar">

    <div class="categorias-grid" id="categoriasGrid">
        <button class="categoria-card active" data-categoria="todos">
            <span class="cat-emoji">🌌</span><span>Ver todo</span>
        </button>
        <button class="categoria-card" data-categoria="componentes">
            <span class="cat-emoji">⚙️</span><span>Componentes</span>
        </button>
        <button class="categoria-card" data-categoria="perifericos">
            <span class="cat-emoji">🖱️</span><span>Periféricos</span>
        </button>
        <button class="categoria-card" data-categoria="redes">
            <span class="cat-emoji">📡</span><span>Redes</span>
        </button>
        <button class="categoria-card" data-categoria="software">
            <span class="cat-emoji">💾</span><span>Software</span>
        </button>
    </div>

    <div class="cat-toolbar-right">
        <div class="cat-search-bar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="buscador-productos" placeholder="Buscar producto…" autocomplete="off" />
        </div>
        <span class="cat-results-count" id="resultsCount"></span>
    </div>
    <div class="cat-filters-inline">
        <select id="ordenar-productos" class="cat-sort-select">
            <option value="default">Ordenar</option>
            <option value="nombre-asc">Nombre A-Z</option>
            <option value="nombre-desc">Nombre Z-A</option>
            <option value="precio-asc">Precio menor</option>
            <option value="precio-desc">Precio mayor</option>
        </select>

        <div class="cat-price-filter">
            <span class="cat-price-label">Precio</span>

            <div class="cat-price-slider-wrap">
                <div class="cat-price-track"></div>
                <div class="cat-price-range" id="slider-range"></div>
                <canvas id="constellation-price"></canvas>
                <input type="range" id="precio-min" step="1">
                <input type="range" id="precio-max" step="1">
            </div>

            <div class="cat-price-values">
                <span id="precio-min-valor">0.00 €</span>
                <span id="precio-max-valor">1000.00 €</span>
            </div>
        </div>
    </div>

</div>

    <!-- Grid productos -->
    <div id="catalogo-container" class="productos-grid"></div>

  </main>

  <!-- MODAL LOGIN -->
  <div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content cat-modal-content">
        <form id="login-form">
          <div class="cat-modal-header">
            <h5 class="cat-modal-title">Iniciar Sesión</h5>
            <button type="button" class="cat-modal-close" data-bs-dismiss="modal">✕</button>
          </div>
          <div class="cat-modal-body">
            <div class="cat-form-group">
              <label>Email</label>
              <input type="email" class="cat-input" id="login-email" placeholder="tu@email.com" required>
            </div>
            <div class="cat-form-group">
              <label>Contraseña</label>
              <input type="password" class="cat-input" id="login-password" placeholder="••••••••" required>
            </div>
            <div class="cat-login-error d-none" id="login-error">
              Email o contraseña incorrectos.
            </div>
            <div class="cat-modal-footer-row">
              <span class="register-text">¿No tienes cuenta? <a href="#" id="register-link">Registrarse</a></span>
              <div class="cat-modal-btns">
                <button type="button" class="cat-btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="cat-btn-neon">Entrar</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/catalogo.js"></script>
  <script type="module" src="js/carrito.js"></script>
    <script type="module" src="js/navbar.js"></script>

</body>
</html>
