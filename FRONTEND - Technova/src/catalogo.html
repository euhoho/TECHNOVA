<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo - TechNova</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/catalogo.css" />
        <link rel="stylesheet" href="css/navbar.css" />

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>


<body>
    <header>
 <nav class="navbar navbar-expand-lg navbar-background">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                <img src="img/LOGO3-TECHNOVA.png" alt="Logo Technova" height="25" class="ms-2">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTechNova">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarTechNova">
                
                <ul class="navbar-nav me-auto align-items-lg-center gap-lg-3">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="nav-productos" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-grid-fill me-1"></i> Catálogo
                        </a>
                        <ul class="dropdown-menu border-0 shadow-lg">
                            <li><a class="dropdown-item" href="#">Monitores</a></li>
                            <li><a class="dropdown-item" href="#">Teclados</a></li>
                            <li><a class="dropdown-item" href="#">Ratones</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Ver Todo</a></li>
                        </ul>
                    </li>
                    
                    <li class="nav-item">
                        <div class="search-container">
                            <input type="text" id="buscador-productos" placeholder="Buscar tecnología...">
                        </div>
                    </li>
                </ul>

                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                    
                    <li class="nav-item">
                        <button class="btn-theme" id="theme-toggle" title="Cambiar modo">
                            <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                        </button>
                    </li>

                    <li class="nav-item" id="login-item">
                        <button class="btn btn-outline-light btn-sm" id="btn-open-login" data-bs-toggle="modal" data-bs-target="#loginModal">
                            Login
                        </button>
                    </li>

                    <li class="nav-item">
<a class="nav-link fav-icon" href="#" title="Favoritos">
    <i class="bi bi-heart-fill"></i>
</a>
                    </li>

                    <li class="nav-item">
                      <a 
                            class="nav-link cart-icon" 
                            href="#" 
                            id="nav-carrito"
                            data-bs-toggle="offcanvas" 
                            data-bs-target="#carritoOffcanvas">
                        </a>
                    </li>

                    <li class="nav-item d-none" id="nav-user-zone">
                        <span class="navbar-text me-2" id="nav-saludo">Hola, Usuario</span>
                        <button class="btn btn-sm" id="btn-logout">Salir</button>
                    </li>
                    <li class="nav-item d-none" id="nav-admin-zone">
                        <a class="btn btn-sm" href="#" id="nav-admin">Panel</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    </header>

    <!-- CONTENIDO -->
    <main class="container my-4">

    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-3">
        <h2 class="m-0 titulo-catalogo">Catálogo</h2>
        <input type="text" id="buscador-productos" class="form-control buscador-catalogo" placeholder="Buscar producto...">
    </div>

    <div class="categorias-grid mb-5">
        <button class="categoria-card active" data-categoria="todos">
            <i class="bi bi-grid-3x3-gap-fill"></i>
            <span>Ver todo</span>
        </button>

        <button class="categoria-card" data-categoria="componentes">
            <i class="bi bi-cpu-fill"></i>
            <span>Componentes</span>
        </button>

        <button class="categoria-card" data-categoria="perifericos">
            <i class="bi bi-keyboard-fill"></i>
            <span>Periféricos</span>
        </button>

        <button class="categoria-card" data-categoria="redes">
            <i class="bi bi-diagram-3-fill"></i>
            <span>Redes</span>
        </button>

        <button class="categoria-card" data-categoria="software">
            <i class="bi bi-code-slash"></i>
            <span>Software</span>
        </button>
    </div>

    <div class="catalogo-zona-productos">
    <div id="catalogo-container" class="row g-4"></div>
</div>
</main>
<!-- MODAL LOGIN -->

    <div class="modal fade modal-right" id="loginModal" tabindex="-1">

        <div class="modal-dialog">
            <div class="modal-content">

                <form id="login-form">

                    <div class="modal-body p-4">

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="modal-title">Login</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="login-email" placeholder="email@correo.com"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="login-password" placeholder="********"
                                required>
                        </div>

                        <div class="alert alert-danger d-none" id="login-error">
                            Email o contraseña incorrectos.
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4">

                            <span class="register-text">
                                ¿No tiene cuenta? <a href="#" id="register-link">Registrar</a>
                            </span>

                            <div>

                                <button type="button" class="btn btn-secondary" id="login-cancel"
                                    data-bs-dismiss="modal">
                                    Cancelar
                                </button>

                                <button type="submit" class="btn btn-primary" id="login-submit">
                                    Entrar
                                </button>

                            </div>

                        </div>

                    </div>

                </form>

            </div>
        </div>
    </div>

      <div class="offcanvas offcanvas-end" tabindex="-1" id="carritoOffcanvas" aria-labelledby="carritoLabel">
    <div class="offcanvas-header bg-dark text-light">
        <h5 id="carritoLabel" class="mb-0"><i class="bi bi-cart3 me-2"></i>Tu Carrito</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" data-bs-dismiss="offcanvas" data-bs-target="#carritoOffcanvas" aria-label="Close" onclick="cerrarCarrito()"></button>
    </div>
    <div class="offcanvas-body">
        <div id="carrito-contenido">
            </div>
        <hr>
        <div class="d-flex justify-content-between fw-bold fs-5">
            <span>Total:</span>
            <span><span id="carrito-total">0.00</span>€</span>
        </div>
        <button class="btn btn-primary w-100 mt-3 py-2" onclick="finalizarCompra()">
            <i class="bi bi-check2-circle me-1"></i> Confirmar Pedido
        </button>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/catalogo.js"></script>
    <script type="module" src="js/carrito.js"></script>
</body>

</html>
