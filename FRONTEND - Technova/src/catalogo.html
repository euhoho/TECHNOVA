<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — TechNova</title>

  <!-- Bootstrap CSS: sistema de grid y componentes (modal, etc.) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons: librería de iconos SVG de Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Estilos del navbar y del catálogo -->
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/catalogo.css" />
  <!-- Fuentes tipográficas del proyecto -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <!-- Favicon -->
  <link rel="icon" href="img/logo-estrella.png" type="image/png">
</head>

<body>

  <!-- NAVBAR compartido
       El navbar se carga dinámicamente desde navbar.html mediante navbar.js -->
  <div id="navbar-container"></div>

  <!-- HERO STRIP
       Banda decorativa con título y subtítulo de la página del catálogo -->
  <div class="cat-hero-strip">
    <!-- Efecto de brillo radial rosa decorativo en la esquina superior derecha -->
    <div class="cat-hero-glow"></div>
    <div class="cat-hero-content">
      <span class="cat-hero-tag">Catálogo completo</span>
      <h1 class="cat-hero-title">Encuentra tu próximo <span class="gradient-text">dispositivo</span></h1>
      <p class="cat-hero-sub">Tecnología de última generación seleccionada para ti</p>
    </div>
  </div>

  <!-- MAIN
       Contenido principal: toolbar de filtros y grid de productos -->
  <main class="cat-main">

    <!-- Toolbar: categorías, buscador, contador de resultados, ordenador y filtro de precio -->
    <div class="cat-toolbar">

        <!-- Píldoras de filtrado por categoría; "todos" viene activa por defecto -->
        <div class="categorias-grid" id="categoriasGrid">
            <button class="categoria-card active" data-categoria="todos">
                <span class="cat-emoji">🌌</span><span>Ver todo</span>
            </button>
            <button class="categoria-card" data-categoria="componentes">
                <span class="cat-emoji">⚙️</span><span>Componentes</span>
            </button>
            <button class="categoria-card" data-categoria="perifericos">
                <span class="cat-emoji">🖱️</span><span>Periféricos</span>
            </button>
            <button class="categoria-card" data-categoria="redes">
                <span class="cat-emoji">📡</span><span>Redes</span>
            </button>
            <button class="categoria-card" data-categoria="software">
                <span class="cat-emoji">💾</span><span>Software</span>
            </button>
        </div>

        <!-- Buscador y contador de resultados -->
        <div class="cat-toolbar-right">
            <div class="cat-search-bar">
                <!-- Icono de lupa superpuesto al input -->
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="buscador-productos" placeholder="Buscar producto…" autocomplete="off" />
            </div>
            <!-- JS actualiza este texto con el número de productos visibles (ej: "24 productos") -->
            <span class="cat-results-count" id="resultsCount"></span>
        </div>

        <!-- Controles de ordenación y filtro de precio -->
        <div class="cat-filters-inline">
            <!-- Select de ordenación: por nombre A-Z/Z-A o precio ascendente/descendente -->
            <select id="ordenar-productos" class="cat-sort-select">
                <option value="default">Ordenar</option>
                <option value="nombre-asc">Nombre A-Z</option>
                <option value="nombre-desc">Nombre Z-A</option>
                <option value="precio-asc">Precio menor</option>
                <option value="precio-desc">Precio mayor</option>
            </select>

            <!-- Filtro de rango de precio con canvas de constelación interactivo.
                 Los inputs range están ocultos; el canvas los sustituye visualmente.
                 JS inicializa los límites reales min/max a partir de los productos cargados. -->
            <div class="cat-price-filter">
                <span class="cat-price-label">Precio</span>

                <div class="cat-price-slider-wrap">
                    <div class="cat-price-track"></div>
                    <div class="cat-price-range" id="slider-range"></div>
                    <!-- Canvas donde se dibuja la visualización estilo constelación -->
                    <canvas id="constellation-price"></canvas>
                    <!-- Inputs range ocultos que guardan los valores min y max del filtro -->
                    <input type="range" id="precio-min" step="1">
                    <input type="range" id="precio-max" step="1">
                </div>

                <!-- Textos con los valores actuales del rango seleccionado -->
                <div class="cat-price-values">
                    <span id="precio-min-valor">0.00 €</span>
                    <span id="precio-max-valor">1000.00 €</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Grid de productos: JS lo rellena dinámicamente con las tarjetas de producto -->
    <div id="catalogo-container" class="productos-grid"></div>

  </main>

  <!-- MODAL LOGIN
       Modal de Bootstrap para iniciar sesión desde el catálogo.
       Se abre al intentar añadir un producto sin estar autenticado. -->
  <div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content cat-modal-content">
        <form id="login-form" novalidate>
          <div class="cat-modal-header">
            <h5 class="cat-modal-title">Iniciar Sesión</h5>
            <!-- data-bs-dismiss cierra el modal de Bootstrap automáticamente -->
            <button type="button" class="cat-modal-close" data-bs-dismiss="modal">✕</button>
          </div>
          <div class="cat-modal-body">
            <div class="cat-form-group">
              <label>Email</label>
              <input type="email" class="cat-input" id="login-email" placeholder="tu@email.com" required>
            </div>
            <div class="cat-form-group">
              <label>Contraseña</label>
              <input type="password" class="cat-input" id="login-password" placeholder="••••••••" required>
            </div>
            <!-- Mensaje de error oculto por defecto; se muestra si las credenciales son incorrectas -->
            <div class="cat-login-error d-none" id="login-error">
              Email o contraseña incorrectos.
            </div>
            <div class="cat-modal-footer-row">
              <span class="register-text">¿No tienes cuenta? <a href="#" id="nbGoRegister">Registrarse</a></span>
              <div class="cat-modal-btns">
                <button type="button" class="cat-btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="cat-btn-neon">Entrar</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS: necesario para que funcionen los modales de Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- config.js define BASE_URL antes de que cualquier otro script haga peticiones a la API -->
  <script src="js/config.js"></script>
  <!-- Scripts del proyecto cargados como módulos ES6 -->
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/catalogo.js"></script>
  <script type="module" src="js/carrito.js"></script>
  <script type="module" src="js/navbar.js"></script>

</body>
</html>
