<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo - TechNova</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/catalogo.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="navbar-container"></div>

    <!-- CONTENIDO -->
    <main class="container my-4">

    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-3">
        <h2 class="m-0 titulo-catalogo">Catálogo</h2>
        <input type="text" id="buscador-productos" class="form-control buscador-catalogo" placeholder="Buscar producto...">
    </div>

    <div class="categorias-grid mb-5">
        <button class="categoria-card active" data-categoria="todos">
            <i class="bi bi-grid-3x3-gap-fill"></i>
            <span>Ver todo</span>
        </button>

        <button class="categoria-card" data-categoria="componentes">
            <i class="bi bi-cpu-fill"></i>
            <span>Componentes</span>
        </button>

        <button class="categoria-card" data-categoria="perifericos">
            <i class="bi bi-keyboard-fill"></i>
            <span>Periféricos</span>
        </button>

        <button class="categoria-card" data-categoria="redes">
            <i class="bi bi-diagram-3-fill"></i>
            <span>Redes</span>
        </button>

        <button class="categoria-card" data-categoria="software">
            <i class="bi bi-code-slash"></i>
            <span>Software</span>
        </button>
    </div>

    <div class="catalogo-zona-productos">
    <div id="catalogo-container" class="row g-4"></div>
</div>
</main>
<!-- MODAL LOGIN -->

    <div class="modal fade modal-right" id="loginModal" tabindex="-1">

        <div class="modal-dialog">
            <div class="modal-content">

                <form id="login-form">

                    <div class="modal-body p-4">

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="modal-title">Login</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="login-email" placeholder="email@correo.com"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="login-password" placeholder="********"
                                required>
                        </div>

                        <div class="alert alert-danger d-none" id="login-error">
                            Email o contraseña incorrectos.
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4">

                            <span class="register-text">
                                ¿No tiene cuenta? <a href="#" id="register-link">Registrar</a>
                            </span>

                            <div>

                                <button type="button" class="btn btn-secondary" id="login-cancel"
                                    data-bs-dismiss="modal">
                                    Cancelar
                                </button>

                                <button type="submit" class="btn btn-primary" id="login-submit">
                                    Entrar
                                </button>

                            </div>

                        </div>

                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/catalogo.js"></script>
</body>

</html>
