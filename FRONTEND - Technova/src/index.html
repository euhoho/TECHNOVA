<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TechNova Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-background">
            <div class="container-fluid">
                <!-- Logo / Marca -->
                <a class="navbar-brand" href="#">
                    <img src="img/logo-technova.png" alt="Logo Technova" height="60" class="ms-2">
                </a>

                <!-- Botón hamburguesa (móvil) -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTechNova"
                    aria-expanded="false">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Links -->
                <div class="collapse navbar-collapse" id="navbarTechNova">
                    <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" id="nav-inicio">Inicio</a>
                        </li>

                        <li class="nav-item">
                            <!-- Abre el modal de login -->
                            <button class="btn btn-outline-light btn-sm" id="btn-open-login" data-bs-toggle="modal"
                                data-bs-target="#loginModal">
                                Login
                            </button>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" id="nav-carrito">Carrito</a>
                        </li>

                        <!-- Zona "usuario logueado" (oculta al principio) -->
                        <li class="nav-item d-none" id="nav-user-zone">
                            <span class="navbar-text text-light me-2" id="nav-saludo">Hola, Usuario</span>
                            <button class="btn btn-warning btn-sm" id="btn-logout">Salir</button>
                        </li>

                        <!-- Link Admin (oculto al principio) -->
                        <li class="nav-item d-none" id="nav-admin-zone">
                            <a class="btn btn-danger btn-sm" href="#" id="nav-admin">Panel de Gestión</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container my-4">
        <!-- Título opcional (no son productos hardcodeados, es solo UI) -->
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h1 class="h4 m-0">Catálogo</h1>
            <!-- Aquí luego pondrás filtro/buscador (Tarea 5.3) si quieres -->
        </div>

        <!-- ESTE DIV DEBE ESTAR VACÍO: aquí JS "inyectará" las cards -->
        <div id="catalogo-container" class="row g-3">
            <!-- NO ESCRIBAS PRODUCTOS AQUÍ -->
        </div>

        <!-- Mensajes de estado (opcional): loading/error, lo maneja JS -->
        <div id="status-message" class="mt-3"></div>
    </main>

    <!-- MODAL LOGIN -->
    <div class="modal fade modal-right" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="login-form">
                    <div class="modal-header">
                        <h5 class=" modal-title" id="loginModalLabel">Login</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>

                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="login-email" placeholder="email@correo.com" required />
                        </div>

                        <div class="mb-3">
                            <label for="login-password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="login-password" placeholder="********" required />
                        </div>

                        <div class="alert alert-danger d-none" role="alert" id="login-error">
                            Email o contraseña incorrectos.
                        </div>
                    </div>

                    <div class="modal-footer">
                        <span class="register-text">
                            ¿No tiene cuenta? <a href="#" id="register-link">Registrar</a>
                        </span>
                        <button type="button" class="btn btn-secondary" id="login-cancel" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" id="login-submit">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (necesario para modal/navbar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Tu JS (lógica de la app) -->
    <script src="js/app.js"></script>
</body>

</html>
